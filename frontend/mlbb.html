<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mobile Legends Top Up</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive.css">
    <div class="packages" id="packages" data-game="mlbb"></div>

</head>

<body>

    <header class="topbar">
        <div class="logo">AZIEL 1Tap TopUp</div>

        <nav>
            <span id="userBox"></span>
            <a href="home.html">Home</a>
            <a href="shop.html">Top Up</a>
            <a href="login.html">Login</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <section class="game-banner">
        <img src="assets/mlbb.jpg" alt="MLBB">
        <div class="overlay">
            <h1>Mobile Legends</h1>
            <p>Instant Diamonds Delivery</p>
        </div>
    </section>

    <section class="topup-box">

        <h2>Enter Account Info</h2>
        <h2>Your Region</h2>

        <select id="regionSelect" disabled>
            <option value="MM">Myanmar - MMK</option>
            <option value="TH">Thailand - THB</option>
            <option value="GLOBAL">Global - USD</option>
        </select>

        <h2>Select Payment</h2>

        <select id="paymentMethod">
            <option value="">Select Payment Method</option>
        </select>

        <p>Currency: <b id="currencyText">MMK</b></p>
        <h2>Select Region</h2>

        <select id="regionSelect">
            <option value="MM">Myanmar - MMK</option>
            <option value="TH">Thailand - THB</option>
            <option value="GLOBAL">Global - USD</option>
        </select>

        <h2>Select Payment</h2>

        <select id="paymentMethod">
            <option value="">Select Payment Method</option>
        </select>

        <p>Currency: <b id="currencyText">MMK</b></p>

        <input type="text" id="userId" placeholder="User ID">
        <input type="text" id="serverId" placeholder="Zone ID">

        <h2>Select Package</h2>

        <div class="packages" id="packages" data-game="mlbb"></div>

        <button id="buyBtn">Buy Now</button>

    </section>

    <footer>
        © 2026 AZIEL 1Tap Shop
    </footer>

    <script src="js/mlbb.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/prices.js"></script>
    <script src="js/region-payment.js"></script>
    <script src="js/mlbb.js"></script>

</body>

</html>
