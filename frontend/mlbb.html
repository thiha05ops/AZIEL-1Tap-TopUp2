<!-- frontend/mlbb.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mobile Legends Top Up</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <header class="topbar">
        <div class="logo">AZIEL 1Tap TopUp</div>

        <nav>
            <span id="userBox"></span>
            <a href="home.html">Home</a>
            <a href="shop.html">Top Up</a>
            <a href="login.html">Login</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <section class="game-banner">
        <img src="assets/mlbb.jpg" alt="MLBB">
        <div class="overlay">
            <h1>Mobile Legends</h1>
            <p>Instant Diamonds Delivery</p>
        </div>
    </section>

    <section class="topup-box">

        <h2>Enter Account Info</h2>

        <input type="text" id="userId" placeholder="User ID">
        <input type="text" id="serverId" placeholder="Zone ID">

        <h2>Select Package</h2>

        <div class="packages">

            <div class="pack">56 Diamonds - 1,500 Ks</div>
            <div class="pack">112 Diamonds - 3,000 Ks</div>
            <div class="pack">223 Diamonds - 6,000 Ks</div>
            <div class="pack">570 Diamonds - 15,000 Ks</div>
            <div class="pack">1160 Diamonds - 30,000 Ks</div>

        </div>

        <button id="buyBtn">Buy Now</button>

    </section>

    <footer>
        © 2026 AZIEL 1Tap Shop
    </footer>

    <script src="js/mlbb.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/logout.js"></script>

</body>

</html>
