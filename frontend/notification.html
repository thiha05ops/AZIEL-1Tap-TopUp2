<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notifications - AZIEL</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/page.css">

    <style>
        body {
            background: #0b0b1a;
            color: #fff;
            font-family: Arial;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .noti-item {
            background: #1e1e3f;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .noti-item:hover {
            background: #2a2a55;
        }

        small {
            color: #aaa;
        }
    </style>
</head>

<body>

    <h2>🔔 Notifications</h2>

    <div id="notiList"></div>

    <script src="js/notification.js"></script>

    <script>
        const list = getNotifications();
        const container = document.getElementById("notiList");

        if (list.length === 0) {
            container.innerHTML = "<p>No notifications</p>";
        }

        list.forEach(n => {
            const div = document.createElement("div");
            div.className = "noti-item";

            div.innerHTML = `
        <p>${n.text}</p>
        <small>${n.time}</small>
    `;

            div.onclick = () => {
                window.location.href = `tracking.html?orderId=${n.id}`;
            };

            container.appendChild(div);
        });

        markAllRead();
    </script>
    <script src="js/notification.js"></script>
    <script src="js/account.js"></script>


</body>

</html>
