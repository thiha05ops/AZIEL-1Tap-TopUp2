<!-- frontend/account.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Account - AZIEL 1Tap</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/account.css">
</head>

<body>

    <header class="account-header">
        <a href="home.html" class="brand">AZIEL</a>

        <div class="noti-bell" id="notiBtn">
            🔔
            <span id="notiCount">0</span>
        </div>

        <div id="notiPanel" class="noti-panel"></div>
    </header>

    <main class="account-layout">

        <aside class="account-sidebar">
            <div class="profile-card">
                <div class="avatar" id="avatarText">A</div>
                <h3 id="profileName">Username</h3>
                <p id="profileRegion">Region: MM</p>
            </div>

            <nav>
                <button class="side-link active" data-tab="overview">Overview</button>
                <button class="side-link" data-tab="profile">Profile</button>
                <button class="side-link" data-tab="history">Order History</button>
                <button class="side-link" data-tab="security">Security</button>
            </nav>
        </aside>

        <section class="account-content">

            <div id="notiPanel" class="noti-panel"></div>

            <div class="tab-panel active" id="overview">
                <h1>My Account</h1>
                <div class="dashboard-grid">
                    <div class="dash-card">
                        <span>Total Orders</span>
                        <strong id="totalOrders">0</strong>
                    </div>
                    <div class="dash-card">
                        <span>Pending</span>
                        <strong id="pendingOrders">0</strong>
                    </div>
                    <div class="dash-card">
                        <span>Completed</span>
                        <strong id="completedOrders">0</strong>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="profile">
                <h1>Profile Information</h1>

                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Your display name">

                <label>Region</label>
                <select id="accountRegion">
                    <option value="MM">Myanmar - MMK</option>
                    <option value="TH">Thailand - THB</option>
                </select>

                <button id="saveProfileBtn">Save Profile</button>
            </div>

            <div class="tab-panel" id="history">
                <h1>Order History</h1>
                <div id="historyList"></div>
            </div>

            <div class="tab-panel" id="security">
                <h1>Account Security</h1>
                <p>Password reset and social account management will be available here.</p>
                <a href="forgot.html" class="security-btn">Reset Password</a>
            </div>

        </section>

    </main>

    <script src="js/account.js"></script>
    <script src="js/logout.js"></script>

</body>

</html>
