<!-- frontend/freefire.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Fire Top Up</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <header class="topbar">
        <div class="logo">AZIEL 1Tap TopUp</div>

        <nav>
            <span id="userBox"></span>
            <a href="home.html">Home</a>
            <a href="shop.html">Top Up</a>
            <a href="login.html">Login</a>

        </nav>
    </header>

    <section class="game-banner">
        <img src="assets/freefire.jpg" alt="Free Fire">
        <div class="overlay">
            <h1>Free Fire</h1>
            <p>Instant Diamonds Delivery</p>
        </div>
    </section>

    <section class="topup-box">

        <h2>Enter Account Info</h2>
        <div class="pay-card" data-method="promptpay">
            <div class="pay-card" data-method="scb">

                <select id="paymentMethod">
                    <option value="">Select Payment Method</option>
                    <div class="payment-grid">

                        <div class="pay-card active" data-method="kbzpay">
                            <img src="assets/payments/kbzpay.png">
                            <span>KBZPay</span>
                        </div>

                        <div class="pay-card" data-method="wavepay">
                            <img src="assets/payments/wavepay.png">
                            <span>WavePay</span>
                        </div>

                    </div>
                    <!-- Thailand Payment Methods -->

                    <h2>Select Payment</h2>

                    <div class="payment-grid" id="paymentGrid">

                        <div class="pay-card active" data-method="promptpay">
                            <img src="assets/payments/promptpay.png" alt="PromptPay">
                            <span>PromptPay</span>
                        </div>

                        <div class="pay-card" data-method="scb">
                            <img src="assets/payments/scb.png" alt="SCB">
                            <span>SCB Bank</span>
                        </div>

                    </div>

                    <input type="hidden" id="paymentMethod" value="promptpay">
                </select>

                <input type="text" id="userId" placeholder="Player UID">

                <h2>Select Package</h2>

                <div class="packages" id="packages" data-game="freefire"></div>

                <button id="buyBtn">Buy Now</button>

    </section>

    <footer>
        © 2026 AZIEL 1Tap Shop
    </footer>

    <script src="js/freefire.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/prices.js"></script>
    <script src="js/region-payment.js"></script>
    <script src="js/freefire.js"></script>
</body>

</html>
