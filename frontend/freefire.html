<!-- frontend/freefire.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Fire Top Up</title>

    <link rel="stylesheet" href="css/main.css?v=2">
    <link rel="stylesheet" href="css/game.css?v=2">
    <link rel="stylesheet" href="css/responsive.css?v=2">

</head>

<body>

    <header class="topbar">
        <div class="logo">AZIEL 1Tap TopUp</div>

        <nav>
            <span id="userBox"></span>
            <div class="noti-bell" onclick="openNoti()">
                <span id="notiCount" class="noti-badge">0</span>
            </div>
            <a href="notification.html">🔔</a>
            <a href="home.html">Home</a>
            <a href="shop.html">Top Up</a>
            <a href="login.html">Login</a>

        </nav>
    </header>

    <section class="game-banner">
        <img src="assets/freefire.jpg" alt="Free Fire">
        <div class="overlay">
            <h1>Free Fire</h1>
            <p>Instant Diamonds Delivery</p>
        </div>
    </section>

    <section class="topup-box">

        <h2>Enter Account Info</h2>

        <input type="text" id="userId" placeholder="Player UID">
        <h2>Select Package</h2>

        <div class="packages" id="packages" data-game="freefire"></div>
        <h2>Select Payment</h2>
        <div class="payment-grid" id="paymentGrid"></div>
        <input type="hidden" id="paymentMethod">

        <button id="buyBtn">Buy Now</button>

    </section>

    <footer>
        © 2026 AZIEL 1Tap Shop
    </footer>

    <script src="js/auth-check.js"></script>
    <script src="js/logout.js"></script>

    <script src="js/prices.js"></script>
    <script src="js/region-payment.js"></script>
    <script src="js/payment-redirect.js"></script>

    <script src="js/freefire.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/account.js"></script>
</body>

</html>
