<!-- frontend/login.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - AZIEL 1Tap</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">

</head>

<body class="auth-page">

    <div class="auth-wrapper">

        <div class="auth-logo">AZIEL</div>

        <div class="auth-box seagm-style">

            <div class="auth-top">
                <h1>SIGN IN</h1>
                <a href="register.html" class="signup-btn">Sign up</a>
            </div>

            <div class="auth-tabs">
                <button class="tab active">User Account</button>
                <button class="tab">Mobile OTP</button>
            </div>

            <div id="msg"></div>

            <label class="radio-row">
                <span class="radio active"></span>
                <span>E-mail / Username</span>
            </label>

            <div class="input-group">
                <span>📧</span>
                <input type="text" id="username" placeholder="Email or Username" autocomplete="off">
            </div>

            <div class="input-group">
                <span>🔒</span>
                <input type="password" id="password" placeholder="Password" autocomplete="new-password">
            </div>

            <button id="loginBtn" class="main-login-btn">SIGN IN</button>

            <p class="forgot-text">
                Forgot password?
                <a href="forgot.html">Reset Password</a>
            </p>

            <div class="divider"></div>

            <p class="social-title">Sign in with social account</p>

            <div class="social-row">
                <a href="/api/auth/google" class="social-btn">G</a>
                <a href="/api/auth/facebook" class="social-btn">f</a>
                <a href="/api/auth/line" class="social-btn">LINE</a>
                <a href="/api/auth/telegram" class="social-btn">✈</a>
            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
