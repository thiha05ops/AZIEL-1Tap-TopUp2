<!-- frontend/pubg.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PUBG Mobile Top Up</title>

    <link rel="stylesheet" href="css/main.css?v=2">
    <link rel="stylesheet" href="css/game.css?v=2">
    <link rel="stylesheet" href="css/responsive.css?v=2">


</head>

<body>

    <header class="topbar">
        <div class="logo">AZIEL 1Tap TopUp</div>

        <nav>
            <span id="userBox"></span>
            <a href="home.html">Home</a>
            <a href="shop.html">Top Up</a>
            <a href="login.html">Login</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <section class="game-banner">
        <img src="assets/pubg.jpg" alt="PUBG">
        <div class="overlay">
            <h1>PUBG Mobile</h1>
            <p>Instant UC Delivery</p>
        </div>
    </section>

    <section class="topup-box">

        <h2>Enter Account Info</h2>

        <input type="text" id="userId" placeholder="Player ID">
        <h2>Select Package</h2>
        <div class="packages" id="packages" data-game="pubg"></div>
        <h2>Select Payment</h2>
        <div class="payment-grid" id="paymentGrid"></div>
        <input type="hidden" id="paymentMethod">

        <button id="buyBtn">Buy Now</button>

    </section>

    <footer>
        © 2026 AZIEL 1Tap Shop
    </footer>

    <script src="js/auth-check.js"></script>
    <script src="js/logout.js"></script>

    <script src="js/prices.js"></script>
    <script src="js/region-payment.js"></script>
    <script src="js/payment-redirect.js"></script>

    <script src="js/pubg.js"></script>
</body>

</html>
